<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Form with OTP</title>
<style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 20px;
    }
    .container {
        max-width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
    }
    input, button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
    }
    button {
        background: green;
        color: white;
        border: none;
        cursor: pointer;
    }
    .otp-section {
        display: none;
    }
</style>
</head>

<body>

<div class="container">
    <h2>COD Order Form</h2>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="mobile" placeholder="Mobile Number" required>

    <button onclick="sendOTP()">Send OTP</button>

    <div class="otp-section" id="otpSection">
        <input type="text" id="otp" placeholder="Enter OTP">
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <input type="text" id="pincode" placeholder="Pincode" onblur="getLocation()">
    <input type="text" id="city" placeholder="City" readonly>
    <input type="text" id="state" placeholder="State" readonly>

    <button onclick="submitForm()">Submit (COD)</button>
</div>

<script>
let generatedOTP = "";

function sendOTP() {
    let mobile = document.getElementById("mobile").value;

    if (mobile.length != 10) {
        alert("Enter valid mobile number");
        return;
    }

    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("OTP Sent: " + generatedOTP); // demo only

    document.getElementById("otpSection").style.display = "block";
}

function verifyOTP() {
    let userOTP = document.getElementById("otp").value;

    if (userOTP == generatedOTP) {
        alert("OTP Verified ✅");
    } else {
        alert("Invalid OTP ❌");
    }
}

function getLocation() {
    let pincode = document.getElementById("pincode").value;

    fetch("https://api.postalpincode.in/pincode/" + pincode)
    .then(res => res.json())
    .then(data => {
        if (data[0].Status === "Success") {
            document.getElementById("city").value = data[0].PostOffice[0].District;
            document.getElementById("state").value = data[0].PostOffice[0].State;
        } else {
            alert("Invalid Pincode");
        }
    });
}

function submitForm() {
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;

    if (!name || !mobile) {
        alert("Fill all fields");
        return;
    }

    alert("Order Placed Successfully (COD) 🎉");
}
</script>

</body>
</html>
